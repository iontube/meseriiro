name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Every day at 06:00 UTC — adds one more sitemap and redeploys
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build site
        run: npm run build

      - name: Generate drip sitemap index
        run: node scripts/drip-sitemap-index.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name meseriiro --branch main
